<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotel Garden Majalengka — Istirahat Nyaman di Pusat Kota</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',sans-serif;background:#faf9f7;color:#2d2d2d;line-height:1.7;overflow-x:hidden}
    a{text-decoration:none;color:inherit}
    ul{list-style:none}
    .container{max-width:1200px;margin:0 auto;padding:0 24px}
    :root{
      --primary:#3d5a3e;--primary-dark:#2c4a2d;--primary-light:#e8ede8;
      --accent:#b8965a;--accent-light:#f0e6d2;
      --cream:#f5f1eb;--cream-dark:#e8e2d8;
      --text:#2d2d2d;--text-light:#6b6b6b;--text-muted:#999;
      --white:#fff;--bg:#faf9f7;--card:#fff;
      --shadow-sm:0 2px 8px rgba(0,0,0,.04);
      --shadow:0 4px 24px rgba(0,0,0,.06);
      --shadow-lg:0 12px 48px rgba(0,0,0,.1);
      --radius:16px;--radius-lg:24px
    }
    .fade-up{opacity:0;transform:translateY(32px);transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1)}
    .fade-up.visible{opacity:1;transform:translateY(0)}
    .d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}
    nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(250,249,247,.88);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.05)}
    nav .container{display:flex;align-items:center;justify-content:space-between;height:72px}
    .logo{display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-weight:700;font-size:1.25rem;color:var(--primary-dark)}
    .logo-icon{width:40px;height:40px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.1rem}
    .nav-links{display:flex;gap:36px;align-items:center}
    .nav-links a{font-size:.88rem;font-weight:500;color:var(--text);transition:color .2s}
    .nav-links a:hover{color:var(--accent)}
    .nav-cta{background:var(--primary);color:#fff!important;padding:10px 24px;border-radius:10px;font-weight:600;transition:all .3s!important}
    .nav-cta:hover{background:var(--primary-dark)!important}
    .menu-btn{display:none;background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--text)}
    .hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:120px 0 80px;background:linear-gradient(160deg,#f0ede6 0%,#e4e8df 40%,#f0ebe2 100%)}
    .hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 400px at 85% 20%,rgba(184,150,90,.12) 0%,transparent 70%),radial-gradient(ellipse 500px 500px at 10% 80%,rgba(61,90,62,.08) 0%,transparent 70%);pointer-events:none}
    .hero .container{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center;position:relative}
    .hero-content{max-width:540px}
    .hero-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(61,90,62,.08);color:var(--primary);font-size:.78rem;font-weight:600;padding:6px 14px;border-radius:24px;margin-bottom:24px;letter-spacing:.5px;text-transform:uppercase}
    .hero-content h1{font-family:'Playfair Display',serif;font-size:3.2rem;font-weight:700;color:var(--primary-dark);line-height:1.15;margin-bottom:20px}
    .hero-content h1 span{color:var(--accent)}
    .hero-content p{font-size:1.08rem;color:var(--text-light);margin-bottom:36px;line-height:1.8}
    .hero-btns{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
    .btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;padding:16px 36px;border-radius:12px;font-weight:600;font-size:.92rem;transition:all .3s;border:none;cursor:pointer}
    .btn-primary:hover{background:var(--primary-dark);transform:translateY(-2px);box-shadow:0 8px 24px rgba(61,90,62,.25)}
    .btn-secondary{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--primary-dark);padding:16px 36px;border-radius:12px;font-weight:600;font-size:.92rem;border:2px solid var(--primary);cursor:pointer;transition:all .3s}
    .btn-secondary:hover{background:var(--primary);color:#fff;transform:translateY(-2px)}
    .hero-stats{display:flex;gap:40px;margin-top:48px;padding-top:32px;border-top:1px solid rgba(0,0,0,.06)}
    .hero-stat .number{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;color:var(--primary-dark)}
    .hero-stat .label{font-size:.78rem;color:var(--text-muted);margin-top:2px}
    .hero-image{position:relative;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-lg);aspect-ratio:4/3}
    .hero-image .placeholder{width:100%;height:100%;background:linear-gradient(135deg,#c5d1b8 0%,#d4c9a8 50%,#bfc7b1 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--primary-dark);font-weight:500;font-size:.95rem}
    .hero-image .placeholder span:first-child{font-size:4rem}
    .hero-image-badge{position:absolute;bottom:20px;left:20px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);padding:12px 20px;border-radius:12px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow)}
    .hero-image-badge .stars{color:var(--accent);font-size:.9rem}
    .hero-image-badge .text{font-size:.78rem;font-weight:500}
    .hero-image-badge .text strong{display:block;font-size:.85rem}
    section{padding:100px 0}
    .section-header{text-align:center;margin-bottom:64px}
    .section-label{display:inline-block;font-size:.75rem;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
    .section-title{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:var(--primary-dark);margin-bottom:16px}
    .section-sub{color:var(--text-light);font-size:1rem;max-width:560px;margin:0 auto;line-height:1.8}
    .rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
    .room-card{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-sm);transition:all .4s cubic-bezier(.22,1,.36,1);border:1px solid rgba(0,0,0,.04)}
    .room-card:hover{transform:translateY(-8px);box-shadow:var(--shadow-lg)}
    .room-img{height:220px;position:relative;overflow:hidden}
    .room-img .placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;font-weight:500;font-size:.9rem;color:var(--primary-dark);transition:transform .5s}
    .room-card:hover .room-img .placeholder{transform:scale(1.05)}
    .room-img .placeholder span:first-child{font-size:3rem}
    .room-img.std{background:linear-gradient(135deg,#d4c9a8,#c5cbb8)}
    .room-img.dlx{background:linear-gradient(135deg,#c5cbb8,#b8c4a8)}
    .room-img.fam{background:linear-gradient(135deg,#c9b896,#d4c9a8)}
    .room-badge{position:absolute;top:14px;left:14px;background:var(--accent);color:#fff;font-size:.7rem;font-weight:600;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
    .room-body{padding:28px}
    .room-body h3{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:600;color:var(--primary-dark);margin-bottom:8px}
    .room-body p{font-size:.88rem;color:var(--text-light);margin-bottom:20px;line-height:1.7}
    .room-footer{display:flex;align-items:center;justify-content:space-between;padding-top:16px;border-top:1px solid rgba(0,0,0,.05)}
    .room-price{font-size:1.2rem;font-weight:700;color:var(--primary-dark)}
    .room-price small{font-size:.75rem;font-weight:400;color:var(--text-muted)}
    .room-book{display:inline-flex;align-items:center;gap:6px;color:var(--accent);font-weight:600;font-size:.85rem;transition:all .2s}
    .room-book:hover{gap:10px;color:var(--primary)}
    .facilities-section{background:var(--cream)}
    .facilities-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .facility-card{background:var(--card);border-radius:var(--radius);padding:36px 28px;text-align:center;transition:all .3s;border:1px solid transparent}
    .facility-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-4px)}
    .facility-icon{width:56px;height:56px;background:var(--primary-light);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.5rem;transition:background .3s}
    .facility-card:hover .facility-icon{background:var(--accent-light)}
    .facility-card h4{font-size:1rem;font-weight:600;color:var(--primary-dark);margin-bottom:8px}
    .facility-card p{font-size:.85rem;color:var(--text-light);line-height:1.7}
    .location-wrap{background:var(--cream);border-radius:var(--radius-lg);padding:56px;display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
    .location-info h3{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:600;color:var(--primary-dark);margin-bottom:16px}
    .location-info p{color:var(--text-light);font-size:.92rem;margin-bottom:24px;line-height:1.8}
    .location-list{display:flex;flex-direction:column;gap:14px}
    .location-item{display:flex;align-items:center;gap:14px;font-size:.9rem;color:var(--text)}
    .location-item .emoji{font-size:1.2rem}
    .location-map{border-radius:var(--radius);overflow:hidden;aspect-ratio:4/3;box-shadow:var(--shadow)}
    .location-map iframe{width:100%;height:100%;border:0}
    .testimonials-section{background:var(--cream)}
    .testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
    .testi-card{background:var(--card);border-radius:var(--radius);padding:32px 28px;position:relative;border:1px solid rgba(0,0,0,.04);transition:all .3s}
    .testi-card:hover{box-shadow:var(--shadow);transform:translateY(-4px)}
    .testi-quote{font-family:'Playfair Display',serif;font-size:3rem;color:var(--accent);opacity:.2;line-height:1;margin-bottom:-12px}
    .testi-stars{color:var(--accent);font-size:.85rem;margin-bottom:12px;letter-spacing:2px}
    .testi-card p{font-size:.9rem;color:var(--text-light);font-style:italic;margin:12px 0 24px;line-height:1.8}
    .testi-author{display:flex;align-items:center;gap:12px}
    .testi-avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:.85rem;flex-shrink:0}
    .testi-name{font-weight:600;font-size:.88rem;color:var(--primary-dark)}
    .testi-role{font-size:.78rem;color:var(--text-muted)}
    .cta-section{background:linear-gradient(135deg,var(--primary-dark),var(--primary));padding:100px 0;text-align:center;position:relative;overflow:hidden}
    .cta-section::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 400px 300px at 80% 50%,rgba(184,150,90,.15) 0%,transparent 70%);pointer-events:none}
    .cta-section h2{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:700;color:#fff;margin-bottom:16px;position:relative}
    .cta-section p{color:rgba(255,255,255,.8);font-size:1rem;margin-bottom:40px;max-width:500px;margin-left:auto;margin-right:auto;position:relative;line-height:1.8}
    .cta-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;position:relative}
    .cta-section .btn-primary{background:var(--accent);color:#fff}
    .cta-section .btn-primary:hover{background:#a68548}
    .cta-section .btn-secondary{border-color:rgba(255,255,255,.4);color:#fff}
    .cta-section .btn-secondary:hover{background:rgba(255,255,255,.1)}
    footer{background:var(--cream);padding:56px 0 24px;color:var(--text-light);font-size:.85rem}
    footer .container{display:grid;grid-template-columns:2fr 1fr 1fr;gap:40px}
    footer h4{font-weight:600;color:var(--primary-dark);margin-bottom:16px;font-size:.9rem}
    footer p,footer a{font-size:.85rem;color:var(--text-light)}
    footer a:hover{
